# FitRank — Submission Metadata
# Portal submission: team name, contact info, GitHub URL, sandbox URL,
# AI tools declared, compute summary, methodology summary.

# ── Team ──────────────────────────────────────────────────────────────────────
team_name: FitRank
contact_email: android@irix.in
github_url: https://github.com/abhishek/fitrank          # update before final submission

# ── Deployment ────────────────────────────────────────────────────────────────
sandbox_url: ""                                           # fill after HF Spaces deploy
streamlit_demo: true

# ── Evaluation (submission_sample.csv vs eval/golden_set.csv) ─────────────────
eval_metrics:
  NDCG_at_10: 0.6586
  NDCG_at_50: 0.8065
  MAP:        0.6759   # improved after corroboration + domain-gate fix
  P_at_10:    0.4000
eval_date: "2026-06-26"
eval_submission: submission_sample.csv
eval_golden:     eval/golden_set.csv

# ── AI Tools Declared ─────────────────────────────────────────────────────────
ai_tools_used:
  - tool: Claude Sonnet 4.6 (Claude Code)
    purpose: >
      Code generation and iteration for feature_builder.py, scorer.py,
      retriever.py, reasoning.py, rank.py, evaluate.py, honeypot_audit.py,
      and app.py. Role model weight tuning via conversation.
  - tool: sentence-transformers (all-MiniLM-L6-v2)
    purpose: Candidate + JD embedding for dense retrieval
  - tool: BM25 (rank_bm25)
    purpose: Sparse lexical retrieval; fused with dense via RRF
  - tool: LightGBM LambdaMART
    purpose: LTR scorer (falls back to weighted-sum if model file absent)

# ── Compute Summary ───────────────────────────────────────────────────────────
compute:
  hardware: CPU-only (no GPU required)
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  embedding_dim: 384
  precompute_time_s: ~30          # for full 500-candidate corpus
  rank_time_s: ~5                 # pipeline run on 500 candidates
  peak_ram_mb: ~400

# ── Methodology Summary ───────────────────────────────────────────────────────
methodology: >
  Two-stage retrieval + multi-signal scoring pipeline.

  Stage 1 — Retrieval:
    Dense retrieval (cosine similarity over MiniLM embeddings) fused with
    BM25 sparse retrieval via Reciprocal Rank Fusion (k=60). Top-50 candidates
    from the fused list proceed to scoring.

  Stage 2 — Scoring (weighted sum, 12 features):
    • cosine_similarity (0.20)   — semantic match to JD embedding
    • domain_alignment (0.20)    — NLP/IR/ranking keyword density in career text
    • production_ml_score (0.20) — density of shipped-ML signals (ranking, retrieval,
                                   eval infra, vector DBs) across career descriptions
    • experience_fit_score (0.10) — YoE vs 5–9 year band with soft taper
    • is_ml_engineer (0.10)      — current/past ML engineering title match
    • behavioral_multiplier (0.10) — composite of open-to-work, recruiter response
                                     rate, recency, interview completion, profile completeness
    • consistency_score (0.05)   — honeypot detector (expert skills with zero duration,
                                   YoE vs career-months gap, title/description mismatch)
    • location_score (0.03)      — preferred Indian city / willing to relocate
    • github_activity (0.02)     — normalised github_activity_score from redrob signals
    • title_disqualified (-1.0)  — hard gate: non-engineer title + no ML career history
    • consulting_penalty (-0.08) — fraction of career at consulting firms (soft, not hard)
    • notice_penalty (-0.02)     — stepped penalty for >30 / >60 / >90 / >120 day notice

  Honeypot defence:
    consistency_score catches three patterns: (a) proficiency=expert but duration_months=0,
    (b) career total months diverges from stated YoE by >3 years,
    (c) non-ML current title but career descriptions stuffed with ML keywords.

  Reasoning:
    Per-candidate natural language reasoning string generated by reasoning.py,
    surfacing top signals (production evidence, skills, location, notice) to
    explain the rank to the hiring team.
